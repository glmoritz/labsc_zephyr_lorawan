# Nothing but the Radioenge may write to the shared UART.
#
# CONFIG_SHELL is already off in prj.conf and stays off — an interactive shell
# on the AT line would be actively harmful, not merely noisy. These symbols
# remove the two writers that ARE enabled by default.
CONFIG_SHELL=n

# The console and the printk/stdout path.
CONFIG_UART_CONSOLE=n
CONFIG_CONSOLE=n
CONFIG_STDOUT_CONSOLE=n

# Logging stays compiled (so log calls still build and can go to RTT or a
# future backend) but loses its UART backend. Set CONFIG_LOG=n instead if you
# want the flash back.
CONFIG_LOG_BACKEND_UART=n
